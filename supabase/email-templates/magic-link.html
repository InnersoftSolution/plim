<!--
  Template do Supabase: "Magic Link" (login sem senha) e base para "Invite".
  Cole em: Supabase → Authentication → Emails → Templates → Magic Link.
  Assunto sugerido:  Seu acesso ao plim
  Variável usada: {{ .ConfirmationURL }}
-->
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f6f7fb;padding:32px 0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <tr>
    <td align="center">
      <table width="100%" cellpadding="0" cellspacing="0" style="max-width:460px;background:#ffffff;border-radius:16px;overflow:hidden;border:1px solid #ecedf5;">
        <tr>
          <td style="padding:28px 32px 8px;">
            <span style="font-size:22px;font-weight:800;color:#4548C9;letter-spacing:-0.02em;">plim<span style="color:#F43F5E;">.</span>work</span>
          </td>
        </tr>
        <tr>
          <td style="padding:8px 32px 4px;">
            <h1 style="margin:0;font-size:20px;color:#111827;">Seu link de acesso</h1>
          </td>
        </tr>
        <tr>
          <td style="padding:8px 32px 4px;">
            <p style="margin:0;font-size:15px;line-height:1.6;color:#4b5563;">
              Clique no botão abaixo para entrar no plim. O link é pessoal e expira em pouco tempo.
            </p>
          </td>
        </tr>
        <tr>
          <td style="padding:24px 32px 8px;">
            <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#4548C9;color:#ffffff;text-decoration:none;font-size:15px;font-weight:700;padding:13px 26px;border-radius:10px;">
              Entrar no plim
            </a>
          </td>
        </tr>
        <tr>
          <td style="padding:16px 32px;border-top:1px solid #f0f1f7;">
            <p style="margin:0;font-size:12px;line-height:1.6;color:#9ca3af;">
              Se você não pediu este acesso, pode ignorar este e-mail.<br />
              plim — tudo começa com um plim.
            </p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
